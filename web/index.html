<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>G&M Infinite Energy S.A. — Energía e ingeniería industrial</title>
<link rel="icon" type="image/svg+xml" href="assets/brand/favicon.svg?v=4" />
<link rel="icon" type="image/png" sizes="16x16" href="assets/brand/favicon-16.png?v=4" />
<link rel="icon" type="image/png" sizes="32x32" href="assets/brand/favicon-32.png?v=4" />
<link rel="icon" type="image/png" sizes="192x192" href="assets/brand/favicon-192.png?v=4" />
<link rel="apple-touch-icon" sizes="512x512" href="assets/brand/favicon-512.png?v=4" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          sans: ["Inter", "ui-sans-serif", "system-ui"],
          mono: ["JetBrains Mono", "ui-monospace", "monospace"],
        },
        colors: {
          brand: {
            green: "#00B127",
            "green-dark": "#009420",
            yellow: "#FFBA03",
            black: "#0A0A0A",
          },
        },
      },
    },
  };
</script>
<style>
  html, body { font-family: "Inter", system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  html { scroll-behavior: smooth; }
  body { overflow-x: hidden; }
  section { scroll-margin-top: 80px; }

  /* Scroll reveal */
  .reveal {
    opacity: 0;
    transform: translateY(32px);
    transition: opacity 0.9s cubic-bezier(.2,.7,.2,1), transform 0.9s cubic-bezier(.2,.7,.2,1);
  }
  .reveal.is-visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* Selection */
  ::selection { background-color: #00B127; color: #fff; }

  /* Tweaks panel */
  .tweaks-panel {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 80;
    background: #0A0A0A;
    color: #fff;
    padding: 20px;
    width: 280px;
    border: 1px solid rgba(255,255,255,0.15);
    font-family: "Inter", sans-serif;
    font-size: 13px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.4);
  }
  .tweaks-panel h4 {
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: #00B127;
    margin-bottom: 14px;
    font-weight: 700;
  }
  .tweaks-panel .group-label {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
    margin: 14px 0 8px 0;
    font-weight: 600;
  }
  .tweaks-panel button {
    padding: 7px 10px;
    border: 1px solid rgba(255,255,255,0.15);
    background: transparent;
    color: #fff;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }
  .tweaks-panel button.active {
    background: #00B127;
    border-color: #00B127;
  }
  .tweaks-panel button:hover:not(.active) {
    border-color: rgba(255,255,255,0.4);
  }
</style>
</head>
<body>
<template id="__bundler_thumbnail">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
<rect width="100" height="100" fill="#0A0A0A"/>
<circle cx="50" cy="44" r="22" fill="none" stroke="#00B127" stroke-width="5"/>
<path d="M40 70 h20 M42 78 h16" stroke="#FFBA03" stroke-width="4" stroke-linecap="round"/>
<text x="50" y="49" font-family="Inter,sans-serif" font-size="16" font-weight="900" fill="#fff" text-anchor="middle">G&amp;M</text>
</svg>
</template>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="components/brand.jsx"></script>
<script type="text/babel" src="components/navbar.jsx"></script>
<script type="text/babel" src="components/hero.jsx"></script>
<script type="text/babel" src="components/about.jsx"></script>
<script type="text/babel" src="components/servicios.jsx"></script>
<script type="text/babel" src="components/sectores.jsx"></script>
<script type="text/babel" src="components/proceso-proyectos.jsx"></script>
<script src="components/argentina-paths.js"></script>
<script type="text/babel" src="components/cobertura.jsx"></script>
<script type="text/babel" src="components/cta-footer.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "light",
  "heroVariant": "imagen",
  "cardStyle": "imagen"
}/*EDITMODE-END*/;

const App = () => {
  const [tweaks, setTweaks] = React.useState(() => {
    try {
      const saved = localStorage.getItem("gm_tweaks");
      if (saved) return { ...TWEAK_DEFAULTS, ...JSON.parse(saved) };
    } catch (e) {}
    return TWEAK_DEFAULTS;
  });
  const [editMode, setEditMode] = React.useState(false);

  React.useEffect(() => {
    try { localStorage.setItem("gm_tweaks", JSON.stringify(tweaks)); } catch (e) {}
  }, [tweaks]);

  // Edit mode listener
  React.useEffect(() => {
    const onMsg = (e) => {
      if (!e.data) return;
      if (e.data.type === "__activate_edit_mode") setEditMode(true);
      if (e.data.type === "__deactivate_edit_mode") setEditMode(false);
    };
    window.addEventListener("message", onMsg);
    window.parent.postMessage({ type: "__edit_mode_available" }, "*");
    return () => window.removeEventListener("message", onMsg);
  }, []);

  const updateTweak = (key, value) => {
    setTweaks((t) => ({ ...t, [key]: value }));
    window.parent.postMessage({ type: "__edit_mode_set_keys", edits: { [key]: value } }, "*");
  };

  // Scroll reveal
  React.useEffect(() => {
    const obs = new IntersectionObserver(
      (entries) => {
        entries.forEach((en) => {
          if (en.isIntersecting) {
            en.target.classList.add("is-visible");
            obs.unobserve(en.target);
          }
        });
      },
      { threshold: 0.12 }
    );
    document.querySelectorAll(".reveal").forEach((el) => obs.observe(el));
    return () => obs.disconnect();
  });

  // Set bg color for body based on theme
  React.useEffect(() => {
    document.body.style.backgroundColor = tweaks.theme === "dark" ? "#0A0A0A" : "#FFFFFF";
  }, [tweaks.theme]);

  const wrap = (node) => <div className="reveal">{node}</div>;

  return (
    <>
      <Navbar theme={tweaks.theme} />
      <Hero variant={tweaks.heroVariant} theme={tweaks.theme} />
      {wrap(<ClientsMarquee theme={tweaks.theme} />)}
      {wrap(<Nosotros theme={tweaks.theme} />)}
      {wrap(<Servicios theme={tweaks.theme} cardStyle={tweaks.cardStyle} />)}
      {wrap(<Sectores theme={tweaks.theme} />)}
      {wrap(<Proyectos theme={tweaks.theme} />)}
      {wrap(<Proceso theme={tweaks.theme} />)}
      {wrap(<Cobertura theme={tweaks.theme} />)}
      {wrap(<CTAFinal theme={tweaks.theme} />)}
      <Footer />
      <WhatsAppButton />

      {editMode && (
        <div className="tweaks-panel">
          <h4>Tweaks</h4>

          <div className="group-label">Tema</div>
          <div className="grid grid-cols-2 gap-2">
            {[["light", "Claro"], ["dark", "Oscuro"]].map(([v, l]) => (
              <button
                key={v}
                className={tweaks.theme === v ? "active" : ""}
                onClick={() => updateTweak("theme", v)}
              >
                {l}
              </button>
            ))}
          </div>

          <div className="group-label">Hero</div>
          <div className="grid grid-cols-2 gap-2">
            {[["imagen", "Imagen"], ["tipografia", "Tipografía"]].map(([v, l]) => (
              <button
                key={v}
                className={tweaks.heroVariant === v ? "active" : ""}
                onClick={() => updateTweak("heroVariant", v)}
              >
                {l}
              </button>
            ))}
          </div>

          <div className="group-label">Estilo de cards servicios</div>
          <div className="grid grid-cols-3 gap-2">
            {[["minimal", "Minimal"], ["bordered", "Grid"], ["imagen", "Imagen"]].map(([v, l]) => (
              <button
                key={v}
                className={tweaks.cardStyle === v ? "active" : ""}
                onClick={() => updateTweak("cardStyle", v)}
              >
                {l}
              </button>
            ))}
          </div>
        </div>
      )}
    </>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
